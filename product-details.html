<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Deepanshi Fashion World</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            margin-top: 2rem;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        /* 📸 इमेज स्लाइडर का स्टाइल */
        .slider-container {
            position: relative;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background-color: #f8f9fa;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .product-slides {
            display: flex;
            transition: transform 0.4s ease-in-out;
            width: 100%;
        }
        .product-slides img {
            width: 100%;
            height: auto;
            display: block;
            flex-shrink: 0;
            object-fit: cover;
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 50%;
            z-index: 10;
        }
        .slider-btn.prev { left: 10px; }
        .slider-btn.next { right: 10px; }
        
        /* 📝 प्रोडक्ट इनफार्मेशन बॉक्स */
        .detail-info-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .detail-title {
            font-size: 2.2rem;
            color: #2c3e50;
            margin-bottom: 0.8rem;
            font-weight: 600;
        }
        .detail-price {
            font-size: 2rem;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 1.2rem;
        }
        .detail-desc {
            color: #555;
            margin-bottom: 2rem;
            line-height: 1.7;
            font-size: 1.1rem;
        }
        
        /* 🟢 व्हाट्सएप बाय बटन */
        .btn-whatsapp-buy {
            background-color: #25D366;
            color: white;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 300px;
            transition: background 0.3s;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }
        .btn-whatsapp-buy:hover {
            background-color: #128C7E;
        }

        @media (max-width: 768px) {
            .product-detail-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
                padding: 1rem;
            }
            .detail-title { font-size: 1.6rem; }
            .detail-price { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🛍️ Deepanshi Fashion World</a>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="cart.html" class="nav-link">My Orders</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="product-detail-display">
            </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Deepanshi Fashion World. All rights reserved.</p>
    </footer>

    <script>
        let currentSlideIndex = 0;

        function moveSlide(direction) {
            const slides = document.querySelector('.product-slides');
            const totalSlides = document.querySelectorAll('.product-slides img').length;
            
            currentSlideIndex += direction;
            
            if (currentSlideIndex >= totalSlides) { currentSlideIndex = 0; }
            if (currentSlideIndex < 0) { currentSlideIndex = totalSlides - 1; }
            
            slides.style.transform = `translateX(-${currentSlideIndex * 100}%)`;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));

            if (!productId) {
                document.getElementById('product-detail-display').innerHTML = '<p class="error-msg">उत्पाद नहीं मिला।</p>';
                return;
            }

            try {
                const response = await fetch('products.json');
                const products = await response.json();
                const product = products.find(p => p.id === productId);

                if (product) {
                    const displayContainer = document.getElementById('product-detail-display');
                    
                    // अगर भविष्य में आप एक से ज़्यादा इमेजेस डालना चाहें (Array के रूप में)
                    // नहीं तो यह सिंगल इमेज को ही स्लाइडर में दिखाएगा
                    const imagesArray = Array.isArray(product.images) ? product.images : [product.image];
                    
                    let slidesHTML = '';
                    imagesArray.forEach(imgUrl => {
                        slidesHTML += `<img src="${imgUrl}" alt="${product.name}" onerror="this.src='images/Gemini.jpg';">`;
                    });

                    // बटन छिपाने का लॉजिक अगर केवल 1 ही इमेज हो
                    const showButtons = imagesArray.length > 1 ? '' : 'display:none;';

                    displayContainer.innerHTML = `
                        <div class="product-detail-container">
                            <div class="slider-container">
                                <button class="slider-btn prev" style="${showButtons}" onclick="moveSlide(-1)">❮</button>
                                <div class="product-slides">
                                    ${slidesHTML}
                                </div>
                                <button class="slider-btn next" style="${showButtons}" onclick="moveSlide(1)">❯</button>
                            </div>

                            <div class="detail-info-box">
                                <h1 class="detail-title">${product.name}</h1>
                                <div class="detail-price">${product.price}</div>
                                <p class="detail-desc">${product.description || 'दीपांशी फैशन वर्ल्ड का प्रीमियम और खूबसूरत कलेक्शन। बेहतरीन क्वालिटी और आरामदायक कपड़ा जो आपको दे एकदम एलिगेंट लुक।'}</p>
                                
                                <button class="btn-whatsapp-buy" onclick="orderOnWhatsApp('${product.name}', '${product.price}')">
                                    💬 Buy on WhatsApp
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    document.getElementById('product-detail-display').innerHTML = '<p class="error-msg">यह प्रोडक्ट अभी स्टॉक में उपलब्ध नहीं है।</p>';
                }
            } catch (error) {
                console.error("डेटा लोड करने में समस्या:", error);
                document.getElementById('product-detail-display').innerHTML = '<p class="error-msg">तकनीकी खराबी के कारण डिटेल्स लोड नहीं हो सकीं।</p>';
            }
        });

        function orderOnWhatsApp(productName, productPrice) {
            // ⚠️ यहाँ अपना असली 10 अंकों का व्हाट्सएप नंबर डालें 
            const whatsappNumber = "91XXXXXXXXXX"; 
            
            const message = `नमस्ते *दीपांशी फैशन वर्ल्ड*,\n\nमुझे आपकी वेबसाइट से यह सूट/कुर्ती पसंद आई है और मैं इसे खरीदना चाहती हूँ:\n\n📌 *प्रोडक्ट का नाम:* ${productName}\n💰 *कीमत:* ${productPrice}\n\nकृपया मुझे इसके ऑर्डर की आगे की जानकारी दें।`;
            const whatsappURL = `https://api.whatsapp.com/send?phone=${whatsappNumber}&text=${encodeURIComponent(message)}`;
            window.open(whatsappURL, '_blank');
        }
    </script>
</body>
</html>
